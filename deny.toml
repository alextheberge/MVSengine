# SPDX-License-Identifier: AGPL-3.0-only
# https://embarkstudios.github.io/cargo-deny/
# Run: cargo deny check  (also in CI job `cargo-deny`)

[advisories]
version = 2
yanked = "warn"

[bans]
multiple-versions = "warn"

[licenses]
version = 2
confidence-threshold = 0.85
allow = [
    "AGPL-3.0",
    "AGPL-3.0-only",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "MPL-2.0",
    "OpenSSL",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
    "0BSD",
]
