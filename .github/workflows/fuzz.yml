name: Fuzz

on:
  workflow_dispatch:

jobs:
  checksum_parser:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: Run fuzz target (short run)
        run: cd fuzz && cargo fuzz run checksum_parser -- -max_total_time=60 -max_len=4096
